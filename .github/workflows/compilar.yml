name: Gesta Patriotica Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: |
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Generar APK y AAB
        run: |
          flet build apk
          flet build aab

      - name: Subir Instaladores
        uses: actions/upload-artifact@v4
        with:
          name: SATR-App-Files
          path: |
            build/flutter/android/app/outputs/flutter-apk/app-release.apk
            build/flutter/android/app/outputs/bundle/release/app-release.aab
